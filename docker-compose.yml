services:
  db:
    image: postgres:16-alpine
    container_name: moji-db
    environment:
      POSTGRES_USER: moji
      POSTGRES_PASSWORD: moji
      POSTGRES_DB: moji
    ports:
      - '5432:5432'
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moji']
      interval: 5s
      timeout: 5s
      retries: 5

  # The game server (serves API + built client). The Cloudflare Tunnel public
  # hostname should target this service by name: http://moji:3000
  moji:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moji
    environment:
      NODE_ENV: production
      PORT: '3000'
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-secret-change-me}
      DATABASE_URL: postgres://moji:moji@db:5432/moji
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Cloudflare Tunnel. Enable with: docker compose --profile tunnel up -d
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env (from the Zero Trust dashboard) and point
  # the tunnel's public hostname at http://moji:3000 (enable WebSockets).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: moji-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      moji:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tunnel
