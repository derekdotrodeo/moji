<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- grape-ink background (full-bleed so it works as a maskable icon too) -->
  <rect width="512" height="512" fill="#15091f"/>
  <!-- hard offset shadow (Y2K sticker treatment) -->
  <rect x="112" y="114" width="318" height="318" rx="62" fill="#0c0414"/>
  <!-- hot-pink sticker tile -->
  <rect x="92" y="92" width="318" height="318" rx="62" fill="#FF3DA5" stroke="#160826" stroke-width="18"/>
  <!-- chunky "M" drawn as a stroke (font-independent) -->
  <polyline points="158,348 158,158 251,268 344,158 344,348" fill="none" stroke="#160826"
    stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
